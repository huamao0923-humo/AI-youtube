{% extends "base.html" %}
{% block title %}系統日誌{% endblock %}

{% block content %}
<div class="topbar">
  <div class="topbar-left">
    <h1>系統日誌</h1>
    <span class="sub">最新 200 行</span>
  </div>
  <div class="topbar-actions">
    <a href="/logs" class="btn btn-ghost">↻ 刷新</a>
  </div>
</div>

<div class="content">
{% if lines %}
<div class="card" style="padding:0;overflow:hidden">
  <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
    <span style="font-size:11px;color:var(--text3)">{{ log_file }}</span>
    <span style="font-size:11px;color:var(--text3)">{{ lines|length }} 行</span>
  </div>
  <div style="overflow-x:auto">
  <pre style="padding:16px;font-size:11px;line-height:1.7;font-family:'Fira Code','Cascadia Code',monospace;color:var(--text2);margin:0;white-space:pre-wrap;word-break:break-all">{% for line in lines %}<span class="log-line {% if 'ERROR' in line %}log-err{% elif 'WARNING' in line %}log-warn{% elif 'INFO' in line %}log-info{% endif %}">{{ line }}</span>
{% endfor %}</pre>
  </div>
</div>
{% else %}
<div class="empty">
  <div class="empty-icon">📋</div>
  <div class="empty-title">今日尚無日誌</div>
  <div class="empty-desc">系統啟動後日誌會出現在這裡。</div>
</div>
{% endif %}
</div>
{% endblock %}

{% block head %}
<style>
.log-err  { color: #fca5a5; }
.log-warn { color: #fcd34d; }
.log-info { color: var(--text2); }
</style>
{% endblock %}
