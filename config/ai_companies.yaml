# AI 戰情室追蹤對象 — 美系前沿實驗室 + 雲端/晶片巨頭 + 研究社群
#
# 欄位說明：
#   key       匹配鍵（寫入 NewsItem.ai_company）
#   name      顯示名
#   logo      Simple Icons CDN URL（免自存 logo）
#   aliases   匹配別名（全小寫，對 title+summary 做 substring 匹配；regex 用 /.../ 包裹）
#   group     frontier_lab | cloud_chip | research
#
# 匹配策略：按 list 順序由上而下，第一個命中即停。別名愈具體愈靠前。

